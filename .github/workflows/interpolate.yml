name: RIFE 3x Interpolation

on:
  workflow_dispatch:

jobs:
  interpolate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y ffmpeg git python3 python3-pip
        pip install torch torchvision numpy opencv-python tqdm scikit-video imageio

    - name: Clone RIFE
      run: |
        git clone https://github.com/hzwer/ECCV2022-RIFE.git

    - name: Download RIFE model
      run: |
        mkdir train_log
        wget https://github.com/hzwer/ECCV2022-RIFE/releases/download/v1.0/flownet.pkl -O train_log/flownet.pkl

    - name: Run interpolation
      run: |
        python3 ECCV2022-RIFE/inference_video.py --exp=3 --video=input.mp4 --output=output.mp4

    - name: Upload result
      uses: actions/upload-artifact@v4
      with:
        name: interpolated-video
        path: output.mp4
