name: RIFE 3x Interpolation

on:
  workflow_dispatch:

jobs:
  interpolate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y ffmpeg git python3 python3-pip unzip

    - name: Install Python dependencies
      run: |
        pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
        pip install numpy opencv-python tqdm scikit-video imageio

    - name: Clone RIFE repository
      run: |
        git clone https://github.com/hzwer/ECCV2022-RIFE.git

    - name: Download pretrained models
      run: |
        cd ECCV2022-RIFE
        wget https://github.com/hzwer/ECCV2022-RIFE/releases/download/train_log/train_log.zip
        unzip train_log.zip
        mv train_log ../

    - name: Run 3x interpolation
      run: |
        python3 ECCV2022-RIFE/inference_video.py --exp=3 --video=input.mp4 --output=output.mp4

    - name: Upload interpolated video
      uses: actions/upload-artifact@v4
      with:
        name: interpolated-video
        path: output.mp4
